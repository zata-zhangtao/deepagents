# Creates release PRs based on conventional commits.
#
# When commits land on main, release-please analyzes them and either:
# - Creates/updates a release PR with changelog and version bump
# - When a release PR is merged, triggers the release workflow
#
# GitHub releases are created by release.yml after all checks pass,
# not by release-please directly (skip-github-release: true in config).

name: "⚠️ (Automated) Release Please"

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Block empty commits before release-please ever sees them. An empty commit
  # has no file paths for release-please to scope to, so it falls back to
  # bumping every package — see the "Empty commit fan-out" entry in
  # .github/RELEASING.md.
  guard-empty-commit:
    name: Block empty commits on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - name: Reject empty commits
        run: |
          if [ "$(git rev-list --count HEAD)" -lt 2 ]; then
            echo "Single-commit history; skipping empty-commit guard."
            exit 0
          fi
          CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD)
          if [ -n "$CHANGED" ]; then
            echo "HEAD touches files; proceeding."
            exit 0
          fi
          COMMIT_MSG=$(git log -1 --format=%s HEAD)
          SHA=$(git rev-parse HEAD)
          echo "::error::Empty commit detected on main: $SHA \"$COMMIT_MSG\""
          echo "::error::release-please scopes commits to packages by changed file paths. An empty commit has none, so every package gets bumped."
          echo "::error::Recovery: revert this commit on main, then push a non-empty commit scoped to a single package directory. See .github/RELEASING.md -> \"Empty commit fan-out\"."
          exit 1

  release-please:
    needs: guard-empty-commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      cli-release: ${{ steps.check-releases.outputs.cli-release }}
      sdk-release: ${{ steps.check-releases.outputs.sdk-release }}
      acp-release: ${{ steps.check-releases.outputs.acp-release }}
      code-release: ${{ steps.check-releases.outputs.code-release }}
      daytona-release: ${{ steps.check-releases.outputs.daytona-release }}
      modal-release: ${{ steps.check-releases.outputs.modal-release }}
      runloop-release: ${{ steps.check-releases.outputs.runloop-release }}
      quickjs-release: ${{ steps.check-releases.outputs.quickjs-release }}
      repl-release: ${{ steps.check-releases.outputs.repl-release }}
      release-version: ${{ steps.check-releases.outputs.release-version }}
      pr: ${{ steps.release.outputs.pr }}
      prs: ${{ steps.release.outputs.prs }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Detect releases by checking CHANGELOG.md modifications AND commit message.
      # release-please always updates CHANGELOG.md when merging a release PR, and
      # the commit message matches pull-request-title-pattern in release-please-config.json:
      #   "release(${component}): ${version}"
      # Components: deepagents-cli, deepagents, deepagents-acp, deepagents-code, langchain-daytona, langchain-modal, langchain-runloop, langchain-quickjs, langchain-repl
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      # release-please uses GITHUB_TOKEN, so its PR events don't trigger
      # pull_request_target (GitHub's infinite-loop prevention). Reuse the
      # shared labelPR() helper so labeling logic stays in one place.
      - name: Label release PRs
        if: steps.release.outputs.prs != '[]' && steps.release.outputs.prs != ''
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        with:
          script: |
            let prs;
            try {
              prs = JSON.parse(process.env.RELEASE_PRS || '[]');
            } catch (e) {
              core.warning(`Failed to parse RELEASE_PRS: ${e.message}`);
              return;
            }
            if (!prs.length) return;
            const { owner, repo } = context.repo;
            const { h } = require('./.github/scripts/pr-labeler.js').loadAndInit(github, owner, repo, core);
            for (const pr of prs) {
              try {
                const labels = await h.labelPR(pr.number, { title: pr.title });
                console.log(`PR #${pr.number} ("${pr.title}"): +[${labels.join(', ')}]`);
              } catch (e) {
                core.warning(`Failed to label PR #${pr.number}: ${e.message}`);
              }
            }

      - name: Check if release PRs were merged
        id: check-releases
        run: |
          if ! CHANGED=$(git diff --name-only HEAD~1 HEAD); then
            echo "::error::git diff failed — is fetch-depth sufficient?"
            exit 1
          fi

          if ! COMMIT_MSG=$(git log -1 --format=%s HEAD); then
            echo "::error::git log failed — cannot read commit message."
            exit 1
          fi

          echo "Commit message: $COMMIT_MSG"
          echo "Changed files:"
          echo "$CHANGED"

          if [ -z "$COMMIT_MSG" ]; then
            echo "::warning::Commit message is empty — no release will be triggered."
          fi

          # Extract version from release commit message: "release(component): X.Y.Z"
          # [^ ]+ stops at the first space to avoid capturing trailing PR refs like "(#1234)"
          # NOTE: separate-pull-requests=true ensures one release commit per workflow run,
          # so a single version output is correct — each package triggers its own run.
          RELEASE_VERSION=$(echo "$COMMIT_MSG" | sed -nE 's/^release\([^)]+\): +([^ ]+).*/\1/p')
          echo "release-version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

          if [ -n "$RELEASE_VERSION" ]; then
            echo "Extracted release version: $RELEASE_VERSION"
          elif echo "$COMMIT_MSG" | grep -qE "^release\("; then
            echo "::warning::Commit looks like a release but version extraction failed: $COMMIT_MSG"
          fi

          # grep -q in an `if` conditional is safe under set -eo pipefail;
          # bash suppresses errexit inside `if` compound commands.

          if echo "$CHANGED" | grep -q "^libs/cli/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(deepagents-cli\):"; then
            echo "cli-release=true" >> "$GITHUB_OUTPUT"
            echo "CLI release detected: $COMMIT_MSG"
          else
            echo "cli-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/deepagents/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(deepagents\):"; then
            echo "sdk-release=true" >> "$GITHUB_OUTPUT"
            echo "SDK release detected: $COMMIT_MSG"
          else
            echo "sdk-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/acp/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(deepagents-acp\):"; then
            echo "acp-release=true" >> "$GITHUB_OUTPUT"
            echo "ACP release detected: $COMMIT_MSG"
          else
            echo "acp-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/code/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(deepagents-code\):"; then
            echo "code-release=true" >> "$GITHUB_OUTPUT"
            echo "Deep Agents Code release detected: $COMMIT_MSG"
          else
            echo "code-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/partners/daytona/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(langchain-daytona\):"; then
            echo "daytona-release=true" >> "$GITHUB_OUTPUT"
            echo "Daytona release detected: $COMMIT_MSG"
          else
            echo "daytona-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/partners/modal/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(langchain-modal\):"; then
            echo "modal-release=true" >> "$GITHUB_OUTPUT"
            echo "Modal release detected: $COMMIT_MSG"
          else
            echo "modal-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/partners/runloop/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(langchain-runloop\):"; then
            echo "runloop-release=true" >> "$GITHUB_OUTPUT"
            echo "Runloop release detected: $COMMIT_MSG"
          else
            echo "runloop-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/partners/quickjs/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(langchain-quickjs\):"; then
            echo "quickjs-release=true" >> "$GITHUB_OUTPUT"
            echo "QuickJS release detected: $COMMIT_MSG"
          else
            echo "quickjs-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/repl/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(langchain-repl\):"; then
            echo "repl-release=true" >> "$GITHUB_OUTPUT"
            echo "REPL release detected: $COMMIT_MSG"
          else
            echo "repl-release=false" >> "$GITHUB_OUTPUT"
          fi

  # Update uv.lock files when release-please creates/updates a PR
  # release-please updates pyproject.toml versions but doesn't regenerate lockfiles
  # https://github.com/googleapis/release-please/issues/2561
  update-lockfiles:
    needs: release-please
    if: needs.release-please.outputs.prs != '[]' && needs.release-please.outputs.prs
      != ''
    name: Update lockfiles (${{ matrix.pr.headBranchName }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: update-lockfiles-${{ matrix.pr.headBranchName }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJson(needs.release-please.outputs.prs) }}
    steps:
      - name: Checkout release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ matrix.pr.headBranchName }}

      - name: Setup uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7

      - name: Update lockfiles
        id: update-lockfiles
        run: |
          regenerate() {
            git ls-files "uv.lock" "**/uv.lock" | sort | while IFS= read -r lockfile; do
              dir=$(dirname "$lockfile")
              echo "Updating $dir"
              if [ "$dir" = "libs/acp" ]; then
                uv lock --directory "$dir" --python 3.14
              else
                uv lock --directory "$dir" --python 3.12
              fi
            done
          }
          regenerate

      - name: Commit and push
        # Retry on push rejection. Concurrent release-please runs (one per push to
        # main) all update the same release branch, so a stale local checkout can
        # lose the push race ("cannot lock ref ...: is at X but expected Y"). On
        # rejection: fetch the new tip, reset, re-run `uv lock` against it, and
        # retry. `uv lock` is deterministic on a given pyproject.toml, so this
        # converges — and if the rebased state already has the right lockfiles
        # (another run won), the diff is empty and we exit cleanly.
        env:
          RELEASE_BRANCH: ${{ matrix.pr.headBranchName }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          regenerate() {
            git ls-files "uv.lock" "**/uv.lock" | sort | while IFS= read -r lockfile; do
              dir=$(dirname "$lockfile")
              if [ "$dir" = "libs/acp" ]; then
                uv lock --directory "$dir" --python 3.14
              else
                uv lock --directory "$dir" --python 3.12
              fi
            done
          }

          stage_and_commit() {
            git add "**/uv.lock"
            if git diff --staged --quiet; then
              return 1
            fi
            git diff --staged --stat
            git commit -m "chore: update lockfiles"
            return 0
          }

          if ! stage_and_commit; then
            echo "No lockfile changes to commit"
            exit 0
          fi

          for attempt in 1 2 3; do
            if git push origin "HEAD:${RELEASE_BRANCH}"; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "::warning::Push rejected on attempt ${attempt}; rebasing onto fresh ${RELEASE_BRANCH} and retrying"
            # Reset to FETCH_HEAD (the SHA `git fetch` just resolved) rather than
            # `origin/${RELEASE_BRANCH}`, so we don't depend on the remote's
            # default fetch refspec being configured to update the
            # remote-tracking ref.
            git fetch origin "${RELEASE_BRANCH}"
            git reset --hard FETCH_HEAD
            regenerate
            if ! stage_and_commit; then
              echo "Lockfile already up-to-date on remote after rebase; nothing to push"
              exit 0
            fi
          done

          echo "::error::Push still rejected after 3 attempts on '${RELEASE_BRANCH}'."
          exit 1

  # Dispatch release.yml for each merged release PR.
  #
  # We use `gh workflow run` (workflow_dispatch) rather than `uses:` (workflow_call)
  # because PyPI Trusted Publishing does not officially support reusable workflows
  # (https://docs.pypi.org/trusted-publishers/troubleshooting/#reusable-workflows-on-github).
  # Dispatching makes each release run a top-level workflow, so the OIDC token
  # claim points at release.yml directly. Trade-off: release.yml runs are
  # separate runs in the Actions tab rather than nested under release-please.
  #
  # release-sha pins the release *artifact* (build, tests, GitHub release tag) to
  # the release-PR merge commit. github.sha here IS the merge commit because
  # release-please.yml only fires on push events, and the release PR was just
  # merged. Forwarding it explicitly means release.yml always reads
  # inputs.release-sha — the auto path and workflow_dispatch retries share one
  # code path, so neither can silently tag a different commit (see RELEASING.md
  # -> Manual Release).
  #
  # Note: `gh workflow run --ref main` resolves the *workflow YAML* against
  # main@HEAD at dispatch time, not against $RELEASE_SHA. The dispatches API
  # accepts only branch/tag names for `ref`, not SHAs, so this race window
  # (commit lands on main between this push event and the dispatch call) is
  # unfixable. In practice it is benign: release.yml itself rarely changes, and
  # the artifact still builds from $RELEASE_SHA via the checkout step.
  trigger-releases:
    needs: release-please
    if: |
      needs.release-please.outputs.cli-release == 'true' ||
      needs.release-please.outputs.sdk-release == 'true' ||
      needs.release-please.outputs.acp-release == 'true' ||
      needs.release-please.outputs.code-release == 'true' ||
      needs.release-please.outputs.daytona-release == 'true' ||
      needs.release-please.outputs.modal-release == 'true' ||
      needs.release-please.outputs.runloop-release == 'true' ||
      needs.release-please.outputs.quickjs-release == 'true' ||
      needs.release-please.outputs.repl-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write # required for `gh workflow run` to dispatch release.yml
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.release-please.outputs.release-version }}
      RELEASE_SHA: ${{ github.sha }}
      RELEASE_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository
        }}/actions/workflows/release.yml
      CLI_RELEASE: ${{ needs.release-please.outputs.cli-release }}
      SDK_RELEASE: ${{ needs.release-please.outputs.sdk-release }}
      ACP_RELEASE: ${{ needs.release-please.outputs.acp-release }}
      CODE_RELEASE: ${{ needs.release-please.outputs.code-release }}
      DAYTONA_RELEASE: ${{ needs.release-please.outputs.daytona-release }}
      MODAL_RELEASE: ${{ needs.release-please.outputs.modal-release }}
      RUNLOOP_RELEASE: ${{ needs.release-please.outputs.runloop-release }}
      QUICKJS_RELEASE: ${{ needs.release-please.outputs.quickjs-release }}
      REPL_RELEASE: ${{ needs.release-please.outputs.repl-release }}
    steps:
      - name: Dispatch release workflows
        # Best-effort: each package dispatch is independent. If one fails (transient
        # API blip, rate limit, ...), continue with the rest — partial dispatch is
        # better than a half-state where some packages are pending and others were
        # never even attempted. Failures are aggregated and the job exits nonzero
        # at the end so the operator sees them.
        #
        # We also write a markdown banner to $GITHUB_STEP_SUMMARY pointing at the
        # release.yml workflow page. This job only *kicks off* the publish runs;
        # the build/test/PyPI-publish steps live in those separate runs, so the
        # operator needs to click through to find them. The summary makes that
        # one click instead of "where did the publish go?".
        run: |
          set -uo pipefail

          DISPATCHED=()
          FAILED=()

          # Validate that an output value is exactly "true" or "false". Catches the
          # case where release-please ever emits an empty/unexpected value, which
          # would otherwise silently no-op the dispatch under the `= "true"` check.
          assert_bool() {
            local name="$1" value="$2"
            case "$value" in
              true|false) ;;
              *)
                echo "::warning::$name has unexpected value '$value' (expected 'true' or 'false'); treating as false"
                ;;
            esac
          }

          dispatch() {
            local package="$1"
            echo "Dispatching release for $package (version=$VERSION, sha=$RELEASE_SHA)"
            # `--repo` is required: this job has no `actions/checkout` step, so
            # `gh` cannot discover the target repo from a local `.git/` and
            # would otherwise fail with `fatal: not a git repository`.
            if gh workflow run release.yml \
              --repo "$GITHUB_REPOSITORY" \
              --ref main \
              -f package="$package" \
              -f version="$VERSION" \
              -f release-sha="$RELEASE_SHA"; then
              DISPATCHED+=("$package")
            else
              echo "::error::Failed to dispatch release.yml for $package"
              FAILED+=("$package")
            fi
          }

          # ${VAR:-false} guards against an output ever being unset/empty. assert_bool
          # surfaces a warning if the value is something other than "true"/"false".
          CLI_RELEASE="${CLI_RELEASE:-false}";         assert_bool CLI_RELEASE     "$CLI_RELEASE"
          SDK_RELEASE="${SDK_RELEASE:-false}";         assert_bool SDK_RELEASE     "$SDK_RELEASE"
          ACP_RELEASE="${ACP_RELEASE:-false}";         assert_bool ACP_RELEASE     "$ACP_RELEASE"
          CODE_RELEASE="${CODE_RELEASE:-false}";       assert_bool CODE_RELEASE    "$CODE_RELEASE"
          DAYTONA_RELEASE="${DAYTONA_RELEASE:-false}"; assert_bool DAYTONA_RELEASE "$DAYTONA_RELEASE"
          MODAL_RELEASE="${MODAL_RELEASE:-false}";     assert_bool MODAL_RELEASE   "$MODAL_RELEASE"
          RUNLOOP_RELEASE="${RUNLOOP_RELEASE:-false}"; assert_bool RUNLOOP_RELEASE "$RUNLOOP_RELEASE"
          QUICKJS_RELEASE="${QUICKJS_RELEASE:-false}"; assert_bool QUICKJS_RELEASE "$QUICKJS_RELEASE"
          REPL_RELEASE="${REPL_RELEASE:-false}";       assert_bool REPL_RELEASE    "$REPL_RELEASE"

          # Banner: log + step summary. The step summary renders at the top of the
          # run page, so operators see the link before scrolling through step logs.
          echo ""
          echo "================================================================"
          echo "  Publish runs (build / tests / PyPI) live in release.yml:"
          echo "  $RELEASE_WORKFLOW_URL"
          echo "  This job only kicks them off."
          echo "================================================================"
          echo ""

          {
            echo "## Release dispatched"
            echo ""
            echo "This job only **kicks off** the publish workflow. Build, tests, and the actual PyPI publish run as separate \`release.yml\` runs."
            echo ""
            echo "👉 **[View \`release.yml\` runs]($RELEASE_WORKFLOW_URL)** to watch each publish."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$CLI_RELEASE" = "true" ];     then dispatch deepagents-cli;      fi
          if [ "$SDK_RELEASE" = "true" ];     then dispatch deepagents;          fi
          if [ "$ACP_RELEASE" = "true" ];     then dispatch deepagents-acp;      fi
          if [ "$CODE_RELEASE" = "true" ];    then dispatch deepagents-code;     fi
          if [ "$DAYTONA_RELEASE" = "true" ]; then dispatch langchain-daytona;   fi
          if [ "$MODAL_RELEASE" = "true" ];   then dispatch langchain-modal;     fi
          if [ "$RUNLOOP_RELEASE" = "true" ]; then dispatch langchain-runloop;   fi
          if [ "$QUICKJS_RELEASE" = "true" ]; then dispatch langchain-quickjs;   fi
          if [ "$REPL_RELEASE" = "true" ];    then dispatch langchain-repl;      fi

          # Append per-package status to the step summary so operators see at a
          # glance which packages were queued vs. which need a manual retry.
          {
            echo "### Dispatched (${#DISPATCHED[@]})"
            if [ "${#DISPATCHED[@]}" -gt 0 ]; then
              for p in "${DISPATCHED[@]}"; do echo "- \`$p\` @ \`$VERSION\`"; done
            else
              echo "_none_"
            fi
            echo ""
            echo "### Failed (${#FAILED[@]})"
            if [ "${#FAILED[@]}" -gt 0 ]; then
              for p in "${FAILED[@]}"; do echo "- \`$p\`"; done
              echo ""
              echo "Recover with:"
              echo ""
              echo '```'
              for p in "${FAILED[@]}"; do
                echo "gh workflow run release.yml -f package=$p -f version=$VERSION -f release-sha=$RELEASE_SHA"
              done
              echo '```'
            else
              echo "_none_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::error::Failed to dispatch ${#FAILED[@]} release(s): ${FAILED[*]}"
            echo "::error::Recover with: gh workflow run release.yml -f package=<name> -f version=$VERSION -f release-sha=$RELEASE_SHA"
            exit 1
          fi
