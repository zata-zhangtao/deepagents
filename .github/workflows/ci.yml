# Main CI workflow for Deep Agents monorepo
#
# Runs on every pull request:
# - Linting for changed packages
# - Unit Tests for changed packages
#
# Only packages with changes are tested. SDK changes also trigger CLI tests.
# Pushes to main and workflow changes run full CI.

name: "🔧 CI"

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

# Cancel redundant workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Required for CodSpeed OIDC authentication in _benchmark.yml
  id-token: write

env:
  UV_NO_SYNC: "true"

jobs:
  # Detect which packages have changes
  changes:
    name: "🔍 Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      deepagents: ${{ steps.filter.outputs.deepagents }}
      cli: ${{ steps.filter.outputs.cli }}
      code: ${{ steps.filter.outputs.code }}
      evals: ${{ steps.filter.outputs.evals }}
      daytona: ${{ steps.filter.outputs.daytona }}
      modal: ${{ steps.filter.outputs.modal }}
      repl: ${{ steps.filter.outputs.repl }}
      runloop: ${{ steps.filter.outputs.runloop }}
      quickjs: ${{ steps.filter.outputs.quickjs }}
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: "🔍 Check for changes"
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          # Each package filter includes workflow/action paths so that CI
          # infrastructure changes are validated against all packages.
          #
          # NOTE: Do NOT add negation patterns (e.g. '!libs/foo/**/*.md')
          # here. dorny/paths-filter evaluates patterns with OR logic, so a
          # negation like '!libs/deepagents/**/*.md' becomes "match anything
          # NOT in that glob" — causing unrelated files (e.g. .github/
          # templates) to match every filter and trigger full CI.
          # See: https://github.com/dorny/paths-filter/issues/97
          filters: |
            deepagents:
              - 'libs/deepagents/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_lint.yml'
              - '.github/workflows/_test.yml'
              - '.github/actions/**'
            cli:
              - 'libs/cli/**'
              - 'libs/deepagents/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_lint.yml'
              - '.github/workflows/_test.yml'
              - '.github/workflows/_benchmark.yml'
              - '.github/actions/**'
            code:
              - 'libs/code/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_lint.yml'
              - '.github/workflows/_test.yml'
              - '.github/actions/**'
            evals:
              - 'libs/evals/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_lint.yml'
              - '.github/workflows/_test.yml'
              - '.github/actions/**'
            daytona:
              - 'libs/partners/daytona/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_lint.yml'
              - '.github/workflows/_test.yml'
              - '.github/actions/**'
            modal:
              - 'libs/partners/modal/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_lint.yml'
              - '.github/workflows/_test.yml'
              - '.github/actions/**'
            runloop:
              - 'libs/partners/runloop/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_lint.yml'
              - '.github/workflows/_test.yml'
              - '.github/actions/**'
            quickjs:
              - 'libs/partners/quickjs/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_lint.yml'
              - '.github/workflows/_test.yml'
              - '.github/workflows/_benchmark.yml'
              - '.github/actions/**'
            repl:
              - 'libs/repl/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_lint.yml'
              - '.github/workflows/_test.yml'
              - '.github/actions/**'

  # Run linting on changed packages
  lint-deepagents:
    name: "🧹 Lint deepagents"
    needs: changes
    if: needs.changes.outputs.deepagents == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/deepagents"
      python-version: "3.11"

  lint-cli:
    name: "🧹 Lint cli"
    needs: changes
    if: needs.changes.outputs.cli == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/cli"
      python-version: "3.11"

  lint-code:
    name: "🧹 Lint code"
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/code"
      python-version: "3.11"

  lint-evals:
    name: "🧹 Lint evals"
    needs: changes
    if: needs.changes.outputs.evals == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/evals"
      python-version: "3.14"

  lint-daytona:
    name: "🧹 Lint daytona"
    needs: changes
    if: needs.changes.outputs.daytona == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/partners/daytona"
      python-version: "3.11"

  lint-modal:
    name: "🧹 Lint modal"
    needs: changes
    if: needs.changes.outputs.modal == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/partners/modal"
      python-version: "3.11"

  lint-runloop:
    name: "🧹 Lint runloop"
    needs: changes
    if: needs.changes.outputs.runloop == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/partners/runloop"
      python-version: "3.11"

  lint-repl:
    name: "🧹 Lint repl"
    needs: changes
    if: needs.changes.outputs.repl == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/repl"
      python-version: "3.11"

  lint-quickjs:
    name: "🧹 Lint quickjs"
    needs: changes
    if: needs.changes.outputs.quickjs == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/partners/quickjs"
      python-version: "3.11"

  # Run unit tests on changed packages
  test-deepagents:
    name: "🧪 Test deepagents"
    needs: changes
    if: needs.changes.outputs.deepagents == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: "libs/deepagents"
      python-versions: '["3.11", "3.12", "3.13", "3.14"]'
      extra-configurations: '[{"python-version": "3.13", "os": "windows-latest"}]'
      coverage-python-version: "3.12"

  test-cli:
    name: "🧪 Test cli"
    needs: changes
    if: needs.changes.outputs.cli == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: "libs/cli"
      python-versions: '["3.11", "3.12", "3.13", "3.14"]'
      coverage-python-version: "3.12"

  test-code:
    name: "🧪 Test deepagents-code"
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: "libs/code"
      python-versions: '["3.11", "3.12", "3.13", "3.14"]'
      coverage-python-version: "3.12"

  test-evals:
    name: "🧪 Test evals"
    needs: changes
    if: needs.changes.outputs.evals == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: "libs/evals"
      python-versions: '["3.12", "3.13", "3.14"]'
      coverage-python-version: "3.12"

  test-daytona:
    name: "🧪 Test daytona"
    needs: changes
    if: needs.changes.outputs.daytona == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: "libs/partners/daytona"
      python-versions: '["3.11", "3.12", "3.13", "3.14"]'
      coverage-python-version: "3.12"

  test-modal:
    name: "🧪 Test modal"
    needs: changes
    if: needs.changes.outputs.modal == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: "libs/partners/modal"
      python-versions: '["3.11", "3.12", "3.13", "3.14"]'
      coverage-python-version: "3.12"

  test-runloop:
    name: "🧪 Test runloop"
    needs: changes
    if: needs.changes.outputs.runloop == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: "libs/partners/runloop"
      python-versions: '["3.11", "3.12", "3.13", "3.14"]'
      coverage-python-version: "3.12"

  test-repl:
    name: "🧪 Test repl"
    needs: changes
    if: needs.changes.outputs.repl == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: "libs/repl"
      python-versions: '["3.11", "3.12", "3.13", "3.14"]'
      coverage-python-version: "3.12"

  # Run CodSpeed benchmarks on SDK changes
  benchmark-deepagents:
    name: "⏱️ Benchmark deepagents"
    needs: changes
    if: needs.changes.outputs.deepagents == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_benchmark.yml
    with:
      working-directory: "libs/deepagents"
    secrets: inherit

  # Run CodSpeed benchmarks on CLI changes
  benchmark-cli:
    name: "⏱️ Benchmark cli"
    needs: changes
    if: needs.changes.outputs.cli == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_benchmark.yml
    with:
      working-directory: "libs/cli"
    secrets: inherit

  benchmark-quickjs:
    name: "⏱️ Benchmark quickjs"
    needs: changes
    if: needs.changes.outputs.quickjs == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_benchmark.yml
    with:
      working-directory: "libs/partners/quickjs"
      has-memory-benchmarks: true
    secrets: inherit

  # Validates every helper script under .github/scripts/test_*.py — currently
  # `test_release_options.py` (release dropdown ↔ package directories) and
  # `test_models.py` (eval matrix outputs ↔ evals.yml). Job id/name are kept
  # for branch-protection compatibility; rename only with a coordinated PR.
  check-release-options:
    name: "Validate Release Options"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - name: "📦 Install Dependencies"
        run: python -m pip install pyyaml pytest
      - name: "🔍 Check workflow helper scripts"
        run: python -m pytest .github/scripts/test_*.py -v

  # Final status check - ensures all jobs passed
  ci_success:
    name: "✅ CI Success"
    needs:
      - changes
      - lint-deepagents
      - lint-cli
      - lint-code
      - lint-evals
      - lint-daytona
      - lint-modal
      - lint-runloop
      - lint-repl
      - lint-quickjs
      - test-deepagents
      - test-cli
      - test-code
      - test-evals
      - test-daytona
      - test-modal
      - test-runloop
      - test-repl
      - benchmark-deepagents
      - benchmark-cli
      - benchmark-quickjs
      - check-release-options
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "🎉 All Checks Passed"
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Get all job results (excluding 'changes' which always succeeds)
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"

          if echo "$results" | grep -q '"failure"'; then
            echo "Some jobs failed"
            exit 1
          fi

          # On main pushes, concurrency preemption routinely cancels
          # in-flight jobs when a newer commit arrives — the next run will
          # validate the latest state, so don't flag those as failures.
          # On PRs and merge_group runs, a cancellation is almost always a
          # human action or a real problem, so keep the gate strict.
          if [ "$EVENT_NAME" != "push" ]; then
            if echo "$results" | grep -q '"cancelled"'; then
              echo "Some jobs were cancelled (not allowed on $EVENT_NAME runs)"
              exit 1
            fi
          fi

          echo "All required checks passed (skipped jobs are OK)"
          exit 0
